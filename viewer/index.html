<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Desktop Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: rgba(12, 18, 37, 0.88);
      --line: rgba(160, 182, 255, 0.2);
      --text: #ebf1ff;
      --accent: #7dd3fc;
      --accent-strong: #38bdf8;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 30%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.18), transparent 28%),
        linear-gradient(180deg, #0b1020, #030712);
      color: var(--text);
      font: 14px/1.4 "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 12px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      backdrop-filter: blur(12px);
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input, button {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(2, 6, 23, 0.7);
      color: var(--text);
    }

    button {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #001019;
      font-weight: 700;
      cursor: pointer;
    }

    .status {
      margin-left: auto;
      color: #cbd5e1;
      white-space: nowrap;
    }

    .stage {
      display: grid;
      place-items: center;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      background: rgba(2, 6, 23, 0.7);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      outline: none;
      background: #000;
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <label>Room <input id="room" value="demo" /></label>
    <button id="connect">Connect</button>
    <div id="status" class="status">Idle</div>
  </div>
  <div class="stage">
    <video id="remoteVideo" autoplay playsinline tabindex="0"></video>
  </div>
  <script src="/viewer.js"></script>
</body>
</html>
